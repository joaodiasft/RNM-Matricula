"$schema" = "./node_modules/wrangler/config-schema.json"
name = "rnm-matricula"
main = ".open-next/worker.js"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
invocation_logs = true

# Variáveis públicas / não sensíveis (secrets ficam no Wrangler Secrets)
[vars]
# Destino dos avisos internos. Com Resend em sandbox, precisa ser o e-mail
# da conta Resend; após verificar domínio, volte para o e-mail da secretaria.
COMPANY_EMAIL = "jcsolucoes3d@gmail.com"
RESEND_FROM = "Redação Nota Mil <onboarding@resend.dev>"
DEFAULT_CARD_FEE_PERCENT = "3.5"
ADMIN_EMAIL = "naredacaonota1000@gmail.com"
NEXT_PUBLIC_APP_URL = "https://rnm-matricula.jmdias2901.workers.dev"
